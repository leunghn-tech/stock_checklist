    const { useState, useEffect, useMemo } = React;

    // ---- 策略選項 ----
    const STRATEGY_OPTIONS = ["VCP", "Pocket Pivot", "BOL", "HVB", "Pull back Recovery", "Pull back Testing", "LVP", "Buyable gap-up", "Shakeout play", "Buy in support level"];

    // ---- M.E.T.S 清單 ----
    const METS_CHECKLIST = [

        { id: "m_breadth50", label: "市寬 - 50天線以上比例", options: [{ text: ">70%", edge: "long", weight: 1 }, { text: "50-70%", edge: "neutral", weight: 1 }, { text: "<50%", edge: "short", weight: 1 }, { text: "Not given", edge: "neutral", weight: 1 }] },

        { id: "m_other_sell", label: "其他賣出訊號", options: [{ text: "市寬背馳", edge: "short", weight: 1 }, { text: "突兀走勢", edge: "short", weight: 1 }, { text: "急漲性走勢", edge: "short", weight: 1 }, { text: "Not given", edge: "neutral", weight: 1 }] }
      ]},
      { category: "所屬板塊 (Sector)", items: [
        { id: "e_rs", label: "板塊相對強度", options: [{ text: "★★★★★ (強)", edge: "long", weight: 1 }, { text: "★★★★☆ (中上)", edge: "long", weight: 1 }, { text: "★★★☆☆ (中等)", edge: "neutral", weight: 1 }, { text: "★★☆☆☆ (弱)", edge: "short", weight: 1 }] },
        { id: "e_trend", label: "所屬板塊趨勢", options: [{ text: "上升趨勢", edge: "long", weight: 1 }, { text: "橫行區間", edge: "long", weight: 1 }, { text: "下跌趨勢", edge: "short", weight: 1 }] },
        { id: "e_peer_rank", label: "個股相對同行排名", options: [{ text: "前 25%", edge: "long", weight: 1 }, { text: "25%-50%", edge: "neutral", weight: 1 }, { text: "後 50%", edge: "short", weight: 1 }, { text: "Not given", edge: "neutral", weight: 1 }] }
      ]},
      { category: "個股趨勢 (Trend)", items: [
        { id: "t_rs", label: "個股相對強度", options: [{ text: "高於 80", edge: "long", weight: 1 }, { text: "50 - 80", edge: "neutral", weight: 1 }, { text: "低於 50", edge: "short", weight: 1 }, { text: "Not given", edge: "neutral", weight: 1 }] },
        { id: "t_long_trend", label: "長期趨勢 (週線)", options: [{ text: "上升趨勢", edge: "long", weight: 1 }, { text: "橫行區間", edge: "neutral", weight: 1 }, { text: "下跌趨勢", edge: "short", weight: 1 }, { text: "Not given", edge: "neutral", weight: 1 }] },
        { id: "t_mid_trend", label: "中/短期趨勢 (日線)", options: [{ text: "上升趨勢", edge: "long", weight: 1 }, { text: "盤整", edge: "neutral", weight: 1 }, { text: "下跌趨勢", edge: "short", weight: 1 }] }
      ]},
      { category: "個股交易型態 (Structure/Vol)", items: [
        { id: "s_daily_support", label: "日線圖 - 重要支持位", dynamic: true, type: "support" },
        { id: "s_daily_resist", label: "日線圖 - 阻力位", dynamic: true, type: "resist" },
        { id: "s_weekly_support", label: "週線圖 - 支持位", dynamic: true, type: "support" },
        { id: "s_weekly_resist", label: "週線圖 - 阻力位", dynamic: true, type: "resist" },
        { id: "s_trendline", label: "趨勢線支持", dynamic: true, type: "support" },
        { id: "s_ma_support", label: "移動平均線 (10/20/50/200MA)", dynamic: true, type: "ma" },
        { id: "s_prev_resist_support", label: "前阻力變支持位", dynamic: true, type: "support" },
        { id: "s_vol_up", label: "上升時成交量", options: [{ text: "帶量上漲", edge: "long", weight: 1 }, { text: "量能一般", edge: "neutral", weight: 1 }, { text: "量能不足", edge: "short", weight: 1 }] },
        { id: "s_vol_down", label: "拉回時成交量", options: [{ text: "低量拉回", edge: "long", weight: 1 }, { text: "帶量下跌", edge: "short", weight: 1 }] },
        { id: "s_gap", label: "裂口跳空", options: [{ text: "上升裂口", edge: "long", weight: 1 }, { text: "無裂口", edge: "neutral", weight: 1 }, { text: "向下裂口", edge: "short", weight: 1 }] },
        { id: "s_shakeout", label: "洗盤 / 假突破", options: [{ text: "無洗盤", edge: "neutral", weight: 1 }, { text: "洗盤 (小量)", edge: "long", weight: 1 }, { text: "危險 (大量)", edge: "short", weight: 1 }] },
        { id: "s_pattern", label: "圖表型態", options: [{ text: "VCP", edge: "long", weight: 1 }, { text: "High tight flag", edge: "long", weight: 1 }, { text: "Cup with handle", edge: "long", weight: 1 }, { text: "Double bottom", edge: "long", weight: 1 }, { text: "Pocket pivot", edge: "long", weight: 1 }, { text: "Head & shoulder", edge: "short", weight: 1 }, { text: "Climax run", edge: "short", weight: 1 }, { text: "Not given", edge: "neutral", weight: 1 }] },
        { id: "s_candlestick", label: "陰陽燭形態", options: [{ text: "破腳穿頭", edge: "long", weight: 1 }, { text: "錘頭", edge: "long", weight: 1 }, { text: "早晨之星", edge: "long", weight: 1 }, { text: "穿頭破腳", edge: "short", weight: 1 }, { text: "倒轉錘頭", edge: "short", weight: 1 }, { text: "黃昏之星", edge: "short", weight: 1 }, { text: "Not given", edge: "neutral", weight: 1 }] },
        { id: "s_macd", label: "MACD (權重0.5)", options: [{ text: "上升 Crossover", edge: "long", weight: 0.5 }, { text: "向下 Crossover", edge: "short", weight: 0.5 }, { text: "糾結中", edge: "neutral", weight: 0.5 }] },
        { id: "s_rsi", label: "RSI (權重0.5)", options: [{ text: ">50 強勢", edge: "long", weight: 0.5 }, { text: "30-50", edge: "neutral", weight: 0.5 }, { text: "<30 超賣", edge: "long", weight: 0.5 }] },
        { id: "s_kdj", label: "Stochastic (權重0.5)", options: [{ text: "低檔黃金交叉", edge: "long", weight: 0.5 }, { text: "高檔死亡交叉", edge: "short", weight: 0.5 }, { text: "Not given", edge: "neutral", weight: 0.5 }] }
      ]}
    ];

    // ---- 工具函數 ----
    const calculateEdges = (answers) => {
      let long = 0, short = 0;
      METS_CHECKLIST.forEach(function(cat) {
        cat.items.forEach(function(item) {
          const ans = answers[item.id];
          if (ans && ans.edge) {
            const w = ans.weight || 1;
            if (ans.edge === 'long') long += w;
            if (ans.edge === 'short') short += w;
          }
        });
      });
      return { long: Math.round(long * 10) / 10, short: Math.round(short * 10) / 10 };
    };

    const formatDateShort = function(ds) {
      if (!ds) return '--';
      const p = ds.split('-');
      if (p.length === 3) return p[1] + '/' + p[2];
      return ds;
    };
    
    const calcHoldingDays = function(b, s) {
      if (!b || !s) return 0;
      const buyDate = new Date(b + 'T00:00:00');
      const sellDate = new Date(s + 'T00:00:00');
      const diff = sellDate - buyDate;
      return Math.max(1, Math.floor(diff / 86400000));
    };
    
    const calcPnL = function(bp, sp) {
      if (!bp || bp === 0 || !sp) return 0;
      return ((sp - bp) / bp) * 100;
    };
    
    const getSupportEdge = function(price, buyPrice) {
      if (!buyPrice || buyPrice <= 0 || !price) return null;
      const pct = ((buyPrice - price) / buyPrice) * 100;
      if (pct < 0) return { text: '跌破 ' + pct.toFixed(1) + '%', edge: "short", pct: pct };
      if (pct < 3) return { text: '很近 ' + pct.toFixed(1) + '%', edge: "long", pct: pct };
      if (pct <= 5) return { text: '適中 ' + pct.toFixed(1) + '%', edge: "neutral", pct: pct };
      return { text: '較遠 ' + pct.toFixed(1) + '%', edge: "short", pct: pct };
    };
    
    const getResistEdge = function(price, buyPrice) {
      if (!buyPrice || buyPrice <= 0 || !price) return null;
      const pct = ((price - buyPrice) / buyPrice) * 100;
      if (pct < 0) return { text: '已突破 ' + pct.toFixed(1) + '%', edge: "short", pct: pct };
      if (pct > 5) return { text: '較遠 ' + pct.toFixed(1) + '%', edge: "long", pct: pct };
      if (pct >= 3) return { text: '適中 ' + pct.toFixed(1) + '%', edge: "neutral", pct: pct };
      return { text: '很近 ' + pct.toFixed(1) + '%', edge: "short", pct: pct };
    };

    // ---- SVG 圖標 ----
    const Icons = {
      Plus: function(s) { s = s || 24; return React.createElement('svg', {xmlns:"http://www.w3.org/2000/svg", width:s, height:s, fill:"none", stroke:"currentColor", strokeWidth:"2.5", strokeLinecap:"round", strokeLinejoin:"round"}, React.createElement('line', {x1:"12", y1:"5", x2:"12", y2:"19"}), React.createElement('line', {x1:"5", y1:"12", x2:"19", y2:"12"})); },
      ArrowLeft: function(s) { s = s || 24; return React.createElement('svg', {xmlns:"http://www.w3.org/2000/svg", width:s, height:s, fill:"none", stroke:"currentColor", strokeWidth:"2.5", strokeLinecap:"round", strokeLinejoin:"round"}, React.createElement('line', {x1:"19", y1:"12", x2:"5", y2:"12"}), React.createElement('polyline', {points:"12 19 5 12 12 5"})); },
      ChevronDown: function(s) { s = s || 16; return React.createElement('svg', {xmlns:"http://www.w3.org/2000/svg", width:s, height:s, fill:"none", stroke:"currentColor", strokeWidth:"2.5", strokeLinecap:"round", strokeLinejoin:"round"}, React.createElement('polyline', {points:"6 9 12 15 18 9"})); },
      ChevronUp: function(s) { s = s || 16; return React.createElement('svg', {xmlns:"http://www.w3.org/2000/svg", width:s, height:s, fill:"none", stroke:"currentColor", strokeWidth:"2.5", strokeLinecap:"round", strokeLinejoin:"round"}, React.createElement('polyline', {points:"18 15 12 9 6 15"})); },
      TrendingUp: function(s) { s = s || 24; return React.createElement('svg', {xmlns:"http://www.w3.org/2000/svg", width:s, height:s, viewBox:"0 0 24 24", fill:"none", stroke:"currentColor", strokeWidth:"2", strokeLinecap:"round", strokeLinejoin:"round"}, React.createElement('polyline', {points:"1 18 8.5 10.5 13.5 15.5 23 6"}), React.createElement('polyline', {points:"17 6 23 6 23 12"})); },
      Trash: function(s) { s = s || 16; return React.createElement('svg', {xmlns:"http://www.w3.org/2000/svg", width:s, height:s, fill:"none", stroke:"currentColor", strokeWidth:"2", strokeLinecap:"round", strokeLinejoin:"round"}, React.createElement('polyline', {points:"3 6 5 6 21 6"}), React.createElement('path', {d:"M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"}), React.createElement('path', {d:"M10 11v6"}), React.createElement('path', {d:"M14 11v6"}), React.createElement('path', {d:"M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"})); },
      EmptyFolder: function(s) { s = s || 40; return React.createElement('svg', {xmlns:"http://www.w3.org/2000/svg", width:s, height:s, fill:"none", stroke:"currentColor", strokeWidth:"1.5", strokeLinecap:"round", strokeLinejoin:"round", className:"text-gray-300"}, React.createElement('path', {d:"M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"})); }
    };

    // ---- Modal 組件 ----
    function Modal(props) {
      const isOpen = props.isOpen;
      const onClose = props.onClose;
      const title = props.title;
      const children = props.children;
      const actions = props.actions;
      
      if (!isOpen) return null;
      
      return React.createElement('div', {
        className: "fixed inset-0 z-50 flex items-center justify-center px-4",
        onClick: onClose
      },
        React.createElement('div', { className: "absolute inset-0 bg-black/30 backdrop-blur-sm" }),
        React.createElement('div', {
          className: "relative bg-white rounded-3xl p-6 max-w-sm w-full shadow-xl animate-fade-in-up",
          onClick: function(e) { e.stopPropagation(); }
        },
          title && React.createElement('h3', { className: "text-lg font-extrabold text-gray-800 mb-2" }, title),
          React.createElement('div', { className: "text-xs text-gray-600 font-medium leading-relaxed" }, children),
          actions && React.createElement('div', { className: "flex justify-end gap-3 mt-5" }, actions)
        )
      );
    }

    // ---- 主應用 ----
    function App() {
      const [trades, setTrades] = useState(function() {
        try {
          const saved = localStorage.getItem('mets_trades_v23');
          return saved ? JSON.parse(saved) : [];
        } catch(e) {
          return [];
        }
      });
      const [view, setView] = useState('dashboard');
      const [currentTrade, setCurrentTrade] = useState(null);
      
      useEffect(function() {
        localStorage.setItem('mets_trades_v23', JSON.stringify(trades));
      }, [trades]);
      
      const goTo = function(v, t) {
        setCurrentTrade(t || null);
        setView(v);
        window.scrollTo(0, 0);
      };
      
      const saveNewTrade = function(data, status) {
        status = status || 'watchlist';
        if (currentTrade && currentTrade.status === 'watchlist') {
          setTrades(function(prev) {
            return prev.map(function(t) {
              if (t.id === currentTrade.id) {
                return Object.assign({}, t, data);
              }
              return t;
            });
          });
        } else {
          const nt = Object.assign({}, data, {
            id: Date.now().toString(),
            status: status,
            createdAt: new Date().toISOString()
          });
          setTrades(function(prev) { return [nt].concat(prev); });
        }
        goTo('dashboard');
      };
      
      const buyFromWatchlist = function(trade, actualBuyPrice) {
        setTrades(function(prev) {
          return prev.map(function(t) {
            if (t.id === trade.id) {
              return Object.assign({}, t, {
                status: 'active',
                buyDate: new Date().toISOString().split('T')[0],
                actualBuyPrice: actualBuyPrice || t.targetBuyPrice
              });
            }
            return t;
          });
        });
      };
      
      const completeTrade = function(tid, review) {
        setTrades(function(prev) {
          return prev.map(function(t) {
            if (t.id === tid) {
              return Object.assign({}, t, review, { status: 'completed' });
            }
            return t;
          });
        });
        goTo('dashboard');
      };
      
      const deleteTrade = function(tid) {
        setTrades(function(prev) {
          return prev.filter(function(t) { return t.id !== tid; });
        });
      };

      const handleSelectTrade = function(trade) {
        if (trade.status === 'watchlist') {
          goTo('new_trade', trade);
        } else if (trade.status === 'active') {
          goTo('review_trade', trade);
        } else if (trade.status === 'completed') {
          goTo('report', trade);
        }
      };

      return React.createElement('div', { className: "app-container min-h-screen bg-gray-50 shadow-2xl relative" },
        view === 'dashboard' && React.createElement(Dashboard, {
          trades: trades,
          onNew: function() { goTo('new_trade'); },
          onSelect: handleSelectTrade,
          onDelete: deleteTrade,
          onBuy: buyFromWatchlist
        }),
        view === 'new_trade' && React.createElement(NewTradeForm, {
          onSave: saveNewTrade,
          onCancel: function() { goTo('dashboard'); },
          editTrade: currentTrade
        }),
        view === 'review_trade' && currentTrade && React.createElement(ReviewTradeForm, {
          trade: currentTrade,
          onSave: function(d) { completeTrade(currentTrade.id, d); },
          onCancel: function() { goTo('dashboard'); }
        }),
        view === 'report' && currentTrade && React.createElement(ReportView, {
          trade: currentTrade,
          onBack: function() { goTo('dashboard'); },
          onDelete: function() {
            deleteTrade(currentTrade.id);
            goTo('dashboard');
          }
        })
      );
    }

    // ---- 儀表板 ----
    function Dashboard(props) {
      const trades = props.trades;
      const onNew = props.onNew;
      const onSelect = props.onSelect;
      const onDelete = props.onDelete;
      const onBuy = props.onBuy;
      
      const [tab, setTab] = useState('watchlist');
      const watchlist = trades.filter(function(t) { return t.status === 'watchlist'; });
      const active = trades.filter(function(t) { return t.status === 'active'; });
      const completed = trades.filter(function(t) { return t.status === 'completed'; });
      const totalComp = completed.length;
      
      let winRate = '--';
      if (totalComp > 0) {
        const profitCount = completed.filter(function(t) { return t.pnlPercent > 0; }).length;
        winRate = ((profitCount / totalComp) * 100).toFixed(1);
      }
      
      let avgPnL = '--';
      if (totalComp > 0) {
        const total = completed.reduce(function(s, t) { return s + (t.pnlPercent || 0); }, 0);
        avgPnL = (total / totalComp).toFixed(2);
      }
      
      const [modal, setModal] = useState({ isOpen: false, type: null, trade: null });

      const openDeleteModal = function(t, e) {
        e.stopPropagation();
        setModal({ isOpen: true, type: 'delete', trade: t });
      };
      
      const openBuyModal = function(t, e) {
        e.stopPropagation();
        setModal({ isOpen: true, type: 'buy', trade: t });
      };
      
      const closeModal = function() {
        setModal({ isOpen: false, type: null, trade: null });
      };
      
      const handleBuyConfirm = function(price) {
        if (modal.trade && price && !isNaN(parseFloat(price)) && parseFloat(price) > 0) {
          onBuy(modal.trade, parseFloat(price));
        }
        closeModal();
      };

      const renderEmptyState = function(message) {
        return React.createElement('div', { className: "flex flex-col items-center justify-center py-16 text-center animate-fade-in-up" },
          React.createElement(Icons.EmptyFolder, { size: 44 }),
          React.createElement('p', { className: "text-gray-400 text-xs font-bold mt-3" }, message)
        );
      };

      // 构建标签按钮数据
      const tabs = [
        { key: 'watchlist', label: '📋 觀察名單', count: watchlist.length },
        { key: 'active', label: '📈 持有中', count: active.length },
        { key: 'history', label: '📊 歷史報告', count: completed.length }
      ];

      return React.createElement('div', { className: "flex flex-col min-h-screen" },
        // 顶部
        React.createElement('header', { className: "bg-gradient-to-r from-purple-700 to-indigo-600 text-white px-5 pt-6 pb-6 rounded-b-[2.5rem] shadow-lg safe-bottom" },

      const [reviewNotes, setReviewNotes] = useState('');
      const [modalMsg, setModalMsg] = useState({ isOpen: false, message: '' });

      const handleSave = function() {
        const bp = parseFloat(actualBuyPrice);
        const sp = parseFloat(sellPrice);
        if (isNaN(bp) || bp <= 0) {
          setModalMsg({ isOpen: true, message: '請輸入有效的實際買入價格。' });
          return;
        }
        if (isNaN(sp) || sp <= 0) {
          setModalMsg({ isOpen: true, message: '請輸入有效的實際賣出價格。' });
          return;
        }
        const holdingDays = calcHoldingDays(trade.buyDate, sellDate);
        const pnlPercent = calcPnL(bp, sp);
        onSave({
          actualBuyPrice: bp,
          sellDate: sellDate,
          sellPrice: sp,
          reviewNotes: reviewNotes,
          holdingDays: holdingDays,
          pnlPercent: pnlPercent

      };

            React.createElement('div', { className: "flex justify-between items-start mb-4" },

                React.createElement('p', { className: "text-3xl font-black tracking-tight mt-0.5" }, (isProfit ? '+' : '') + (trade.pnlPercent ? trade.pnlPercent.toFixed(2) : '0.00') + '%')
              )

            React.createElement('div', { className: "grid grid-cols-3 gap-2 border-t border-white/20 pt-3.5 mt-2 text-center text-xs" },
              React.createElement('div', null,
                React.createElement('p', { className: "opacity-70 text-[9px] font-bold uppercase mb-0.5" }, "平均買價"),
                React.createElement('p', { className: "font-extrabold text-base" }, '$' + (trade.actualBuyPrice ? trade.actualBuyPrice.toFixed(2) : '--'))
              ),
              React.createElement('div', { className: "border-l border-r border-white/10" },
                React.createElement('p', { className: "opacity-70 text-[9px] font-bold uppercase mb-0.5" }, "賣出價格"),
                React.createElement('p', { className: "font-extrabold text-base" }, '$' + (trade.sellPrice ? trade.sellPrice.toFixed(2) : '--'))

          React.createElement('div', { className: "bg-white rounded-2xl p-4 card-shadow-sm border border-gray-100 space-y-2 animate-fade-in-up" },
            React.createElement('h3', { className: "font-extrabold text-[11px] text-gray-400 uppercase tracking-wider" }, "💡 學習筆記 (Lessons Learned)"),
            React.createElement('p', { className: "text-xs text-gray-700 leading-relaxed font-semibold whitespace-pre-wrap bg-gray-50/50 p-3 rounded-xl border border-gray-100" }, trade.reviewNotes || '無任何心得筆記。')
